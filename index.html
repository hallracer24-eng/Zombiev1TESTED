<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dylan's Zombie Survival</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="ui">
    <p>Health: <span id="health">100</span></p>
    <p>Score: <span id="score">0</span></p>
    <p>Round: <span id="roundNum">1</span></p>
  </div>

  <div id="bossIndicator" style="display:none;">
    <h2>BOSS INCOMING!</h2>
  </div>

  <div id="mainMenu" class="menu">
    <h1>Dylan's Zombie Survival</h1>
    <div id="menuStats">
      <p>High Score: <span id="highScore">0</span></p>
      <p>Last Round Survived: <span id="lastRound">0</span></p>
    </div>
    <button id="startBtn">Start Game</button>

   <!-- Footer Section inside mainMenu -->
<div id="footerSection" style="display:flex; justify-content:space-between; width: 100%; margin-top: 20px; align-items:center;">
 
  <!-- Left: Contact Me Button -->
  <button id="contactBtn" style="background-color:#444; color:#fff; padding:10px 15px; border-radius:8px; border:none; cursor:pointer; font-size:16px;">
    Contact Me Here
  </button>

  <!-- Right: Portfolio Link -->
  <div id="portfolioLink" style="text-align:right; font-size:16px; display:flex; align-items:center; gap:5px; cursor:pointer;">
    <span id="portfolioText">Enjoying this experience? Check out Dylan's portfolio here</span>
    <span id="arrow">➔</span>
  </div>

</div> 

<!-- Rating Section -->
<div id="ratingSection" style="margin-top:20px; text-align:center; display:flex; flex-direction:column; align-items:center;">
  <h2 style="margin-bottom:10px;">Rate this game</h2>
  <div id="stars">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>
  <textarea id="commentBox" rows="3" placeholder="Leave a comment..." style="margin-top:10px; width:70%; max-width:400px;"></textarea>
  <button id="submitRating" style="margin-top:10px; padding:10px 20px; font-size:18px;">Submit</button>
</div> 

  <div id="gameOverMenu" class="menu" style="display:none;">
    <h1>Game Over</h1>
    <div id="gameOverStats">
      <p>High Score: <span id="highScoreGameOver">0</span></p>
      <p>Round Survived: <span id="lastRoundGameOver">0</span></p>
    </div>
    <button id="restartBtn">Restart</button>
    <button id="mainMenuBtn">Main Menu</button>
    <button id="quitBtn">Quit</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
