<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dylan's Zombie Survival</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Mobile joystick and fire button styling */
    #mobileControls {
      display: none; /* hidden by default */
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
    }

    #joystick, #fireBtn {
      width: 100px;
      height: 100px;
      background-color: rgba(255,0,0,0.4);
      border-radius: 50%;
      pointer-events: all;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      user-select: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <p>Health: <span id="health">100</span></p>
    <p>Score: <span id="score">0</span></p>
    <p>Round: <span id="roundNum">1</span></p>
  </div>

  <div id="bossIndicator" style="display:none;">
    <h2>BOSS INCOMING!</h2>
  </div>

  <div id="mainMenu" class="menu">
    <h1>Dylan's Zombie Survival</h1>
    <div id="menuStats">
      <p>High Score: <span id="highScore">0</span></p>
      <p>Last Round Survived: <span id="lastRound">0</span></p>
    </div>
    <button id="startBtn">Start Game</button>
  </div>

  <div id="gameOverMenu" class="menu" style="display:none;">
    <h1>Game Over</h1>
    <div id="gameOverStats">
      <p>High Score: <span id="highScoreGameOver">0</span></p>
      <p>Round Survived: <span id="lastRoundGameOver">0</span></p>
    </div>
    <button id="restartBtn">Restart</button>
    <button id="mainMenuBtn">Main Menu</button>
    <button id="quitBtn">Quit</button>
  </div>

  <!-- Mobile touch controls -->
  <div id="mobileControls">
    <div id="joystick">◯</div>
    <div id="fireBtn">FIRE</div>
  </div>

  <!-- Game scripts -->
  <script src="script.js"></script>
  <script src="mobile_controls.js"></script>
</body>
</html>
